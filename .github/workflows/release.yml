name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v4.0.1)"
        required: true

env:
  VERSION_TAG: ${{ github.event.inputs.version || github.ref_name }}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: wails3 task darwin:package:universal

      - name: Zip app bundle
        run: cd bin && zip -r ghost-chat-macos.zip ghost-chat.app

      - uses: actions/upload-artifact@v4
        with:
          name: ghost-chat-macos
          path: bin/ghost-chat-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: wails3 task build

      - uses: actions/upload-artifact@v4
        with:
          name: ghost-chat-windows
          path: bin/ghost-chat.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate electron-updater manifests
        run: |
          VERSION="${VERSION_TAG#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          DUMMY_SHA="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

          cat > artifacts/latest.yml <<EOF
          version: ${VERSION}
          files:
            - url: ghost-chat-Setup-${VERSION}.exe
              sha512: ${DUMMY_SHA}
              size: 1
          path: ghost-chat-Setup-${VERSION}.exe
          sha512: ${DUMMY_SHA}
          releaseDate: '${DATE}'
          EOF

          cat > artifacts/latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ghost-chat-${VERSION}.dmg
              sha512: ${DUMMY_SHA}
              size: 1
          path: ghost-chat-${VERSION}.dmg
          sha512: ${DUMMY_SHA}
          releaseDate: '${DATE}'
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/ghost-chat-macos.zip
            artifacts/ghost-chat.exe
            artifacts/latest.yml
            artifacts/latest-mac.yml
