name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. v4.0.1) — leave empty to auto-detect from commits"
        required: false
      release-candidate:
        description: "Draft a release candidate (vX.Y.Z-rc.N, marked as prerelease)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency: release

jobs:
  determine-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        env:
          RC: ${{ inputs.release-candidate }}
          OVERRIDE: ${{ inputs.version }}
        run: |
          args=()

          if [ "$RC" = "true" ]; then
            args+=(--rc)
          fi

          if [ -n "$OVERRIDE" ]; then
            args+=(--override "$OVERRIDE")
          fi

          version="$(bash .github/scripts/next-version.sh "${args[@]}")"

          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "tag $version already exists" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: \`$version\`" >> "$GITHUB_STEP_SUMMARY"

  build-macos:
    needs: determine-version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: wails3 task darwin:package:universal
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}

      - name: Zip app bundle
        run: cd bin && zip -r ghost-chat-macos.zip ghost-chat.app

      - uses: actions/upload-artifact@v7
        with:
          name: ghost-chat-macos
          path: bin/ghost-chat-macos.zip

  build-windows:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: wails3 task build
        env:
          VERSION: ${{ needs.determine-version.outputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: ghost-chat-windows
          path: bin/ghost-chat.exe

  create-release:
    needs: [determine-version, build-macos, build-windows]
    runs-on: ubuntu-latest

    env:
      VERSION_TAG: ${{ needs.determine-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag "$VERSION_TAG"
          git push origin "$VERSION_TAG"

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate electron-updater manifests
        run: |
          VERSION="${VERSION_TAG#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          DUMMY_SHA="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

          cat > artifacts/latest.yml <<EOF
          version: ${VERSION}
          files:
            - url: ghost-chat-Setup-${VERSION}.exe
              sha512: ${DUMMY_SHA}
              size: 1
          path: ghost-chat-Setup-${VERSION}.exe
          sha512: ${DUMMY_SHA}
          releaseDate: '${DATE}'
          EOF

          cat > artifacts/latest-mac.yml <<EOF
          version: ${VERSION}
          files:
            - url: ghost-chat-${VERSION}.dmg
              sha512: ${DUMMY_SHA}
              size: 1
          path: ghost-chat-${VERSION}.dmg
          sha512: ${DUMMY_SHA}
          releaseDate: '${DATE}'
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          draft: true
          prerelease: ${{ inputs.release-candidate }}
          generate_release_notes: true
          append_body: true
          body: |
            <p align="center">
              Your support is greatly appreciated! 🙏
            </p>
            <p align="center">
            <a href="https://www.paypal.com/donate/?hosted_button_id=RQFDVMBP397KG">
            <img src="https://img.shields.io/badge/PayPal-00457C?style=for-the-badge&logo=paypal&logoColor=white"
            alt="Donate with PayPal" width="145" />
            </a>
            <a href="https://ko-fi.com/enubia">
            <img src="https://img.shields.io/badge/Ko--fi-FF5E5B?style=for-the-badge&logo=ko-fi&logoColor=white"
            alt="Buy Me A Coffee" width="126" />
            </a>
            </p>

            ## Downloads

            - **Download for [Windows](https://github.com/Enubia/ghost-chat/releases/latest/download/ghost-chat.exe)**
            - **Download for [Mac](https://github.com/Enubia/ghost-chat/releases/latest/download/ghost-chat-macos.zip)**

            ### Installation / Usage / Bug reporting

            A detailed description is available on our [wiki](https://github.com/Enubia/ghost-chat/wiki).

            ---
          files: |
            artifacts/ghost-chat-macos.zip
            artifacts/ghost-chat.exe
            artifacts/latest.yml
            artifacts/latest-mac.yml
